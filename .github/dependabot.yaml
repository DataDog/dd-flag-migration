# Dependabot configuration for dd-flag-migration
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Strategy:
# - Dev dependency minor/patch updates are grouped and auto-merged via GitHub Actions
# - Production minor/patch updates are grouped to reduce PR noise

version: 2
updates:
  # NPM dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      production-minor-patch:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
    commit-message:
      prefix: '👷 chore(deps)'
      prefix-development: '👷 chore(deps-dev)'
      include: 'scope'

  # GitHub Actions dependencies
    cooldown:
      default-days: 2
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    groups:
      github-actions:
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: '👷 ci(deps)'
      include: 'scope'
    cooldown:
      default-days: 2
