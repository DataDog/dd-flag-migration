name: Validate Licenses

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  release:
    types: [created]

permissions:
  contents: read
  packages: read

jobs:
  validate-licenses:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate licenses
        run: ./scripts/licenses-validate.sh
